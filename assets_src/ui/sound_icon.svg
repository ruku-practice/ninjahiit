<svg class="sound-icon is-on" viewBox="0 0 24 24" role="img" aria-label="Sound setting" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sndIconAccent" x1="6" y1="5" x2="19" y2="19" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff4f81"/>
      <stop offset="1" stop-color="#ff8a4f"/>
    </linearGradient>
    <filter id="sndIconSoftGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.45" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .sound-icon .ico-on,
    .sound-icon .ico-off {
      transition: opacity 160ms ease, transform 160ms ease;
      transform-origin: 12px 12px;
    }

    .sound-icon.is-on .ico-on,
    .sound-icon:not(.is-off) .ico-on {
      opacity: 1;
      transform: scale(1);
    }

    .sound-icon.is-on .ico-off,
    .sound-icon:not(.is-off) .ico-off {
      opacity: 0;
      transform: scale(0.96);
    }

    .sound-icon.is-off .ico-on {
      opacity: 0;
      transform: scale(0.96);
    }

    .sound-icon.is-off .ico-off {
      opacity: 1;
      transform: scale(1);
    }
  </style>

  <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
    <path d="M4.75 9.25h3.1l4.35-3.45v12.4l-4.35-3.45h-3.1z"/>
    <path d="M7.85 9.25v5.5"/>
  </g>

  <path d="M10.1 7.5l2.1-1.7v12.4l-2.1-1.7z" fill="url(#sndIconAccent)" opacity="0.26"/>
  <path d="M4.75 9.25h3.1l4.35-3.45v12.4l-4.35-3.45h-3.1z" fill="none" stroke="url(#sndIconAccent)" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.1" opacity="0.55"/>

  <g class="ico-on" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M15.35 8.3c1.05.92 1.65 2.22 1.65 3.7s-.6 2.78-1.65 3.7" stroke="currentColor" stroke-width="2"/>
    <path d="M18.05 6.15A8.05 8.05 0 0 1 20.25 12a8.05 8.05 0 0 1-2.2 5.85" stroke="currentColor" stroke-width="1.9" opacity="0.78"/>
    <path d="M15.35 8.3c1.05.92 1.65 2.22 1.65 3.7s-.6 2.78-1.65 3.7" stroke="url(#sndIconAccent)" stroke-width="1.05" opacity="0.86" filter="url(#sndIconSoftGlow)"/>
    <path d="M18.05 6.15A8.05 8.05 0 0 1 20.25 12a8.05 8.05 0 0 1-2.2 5.85" stroke="url(#sndIconAccent)" stroke-width="1" opacity="0.62" filter="url(#sndIconSoftGlow)"/>
  </g>

  <g class="ico-off" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M15.15 9.35l3.85 3.85" stroke="currentColor" stroke-width="2" opacity="0.24"/>
    <path d="M19 9.35l-5.55 5.55" stroke="currentColor" stroke-width="2.15"/>
    <path d="M19 9.35l-5.55 5.55" stroke="url(#sndIconAccent)" stroke-width="1.15" opacity="0.88" filter="url(#sndIconSoftGlow)"/>
  </g>
</svg>

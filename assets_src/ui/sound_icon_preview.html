<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sound Icon Preview</title>
  <style>
    :root {
      color-scheme: dark;
      --navy: #1f2a44;
      --pink: #ff4f81;
      --orange: #ff8a4f;
      --teal: #39e1d3;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 18% 16%, rgba(57, 225, 211, 0.16), transparent 28%),
        radial-gradient(circle at 82% 24%, rgba(255, 79, 129, 0.18), transparent 30%),
        #101727;
      color: white;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(900px, calc(100vw - 32px));
      display: grid;
      gap: 18px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .surface {
      min-height: 176px;
      padding: 18px;
      display: grid;
      align-content: space-between;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      overflow: hidden;
    }

    .surface-gradient {
      background: linear-gradient(135deg, var(--pink), var(--orange));
    }

    .surface-navy {
      background:
        linear-gradient(135deg, rgba(57, 225, 211, 0.14), transparent 42%),
        var(--navy);
    }

    .surface-glass {
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.07)),
        rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(16px);
    }

    .label {
      margin: 0;
      color: rgba(255, 255, 255, 0.82);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .buttons {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .sound-button {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.32),
        0 8px 20px rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(12px);
    }

    .surface-gradient .sound-button {
      color: #fff;
    }

    .surface-glass .sound-button {
      color: var(--navy);
      border-color: rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.34);
    }

    .sound-button svg {
      width: 24px;
      height: 24px;
      display: block;
    }

    /* Toggle by changing only the SVG class:
       ON:  <svg class="sound-icon is-on" ...>
       OFF: <svg class="sound-icon is-off" ...>
       No innerHTML replacement is needed. */
    .sound-icon .ico-on,
    .sound-icon .ico-off {
      transition: opacity 160ms ease, transform 160ms ease;
      transform-origin: 12px 12px;
    }

    .sound-icon.is-on .ico-on,
    .sound-icon:not(.is-off) .ico-on {
      opacity: 1;
      transform: scale(1);
    }

    .sound-icon.is-on .ico-off,
    .sound-icon:not(.is-off) .ico-off {
      opacity: 0;
      transform: scale(0.96);
    }

    .sound-icon.is-off .ico-on {
      opacity: 0;
      transform: scale(0.96);
    }

    .sound-icon.is-off .ico-off {
      opacity: 1;
      transform: scale(1);
    }

    @media (max-width: 720px) {
      .preview-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

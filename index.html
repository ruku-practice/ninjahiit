<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>サクヤといっしょに4分HIIT</title>
  <meta name="description" content="忍びのサクヤと毎日4分。クリプトニンジャのキャラと一緒に頑張るHIIT・タバタタイマー（ファンメイドアプリ）">
  <meta name="theme-color" content="#2b3a67">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=40">
</head>
<body>

  <!-- ホーム（HUDダッシュボード） -->
  <section id="screen-home" class="screen active hud">
    <div class="hud-env"></div>
    <div class="hud-scroll">
      <div id="status-card" class="hud-summary glass"></div>

      <div class="hud-body">
        <aside class="hud-companion">
          <div id="home-chara" class="chara-box"></div>
          <p id="home-quote" class="hud-bubble"></p>
        </aside>
        <div class="hud-menu-col">
          <div class="hud-sec">ワークアウトメニュー<i class="hud-slash"></i></div>
          <div id="preset-list"></div>
          <button id="btn-catalog" class="hud-catalog glass"><span>📜</span> 種目のうごきを見る</button>
        </div>
      </div>

      <button id="hud-challenge" class="hud-challenge glass">
        <span class="hud-ch-flag">🚩</span>
        <span class="hud-ch-main"><b>今日のチャレンジ</b><small id="hud-ch-desc"></small></span>
        <span class="hud-ch-go">›</span>
      </button>

      <p class="fan-note">本アプリはCryptoNinjaのファンメイド（二次創作）アプリです。公式・公認アプリではありません。</p>
    </div>

    <nav class="hud-nav">
      <button class="hud-tab active" aria-label="ホーム"></button>
      <button class="hud-tab" data-soon="スケジュール" aria-label="スケジュール"></button>
      <button class="hud-tab" data-soon="ミッション" aria-label="ミッション"></button>
      <button class="hud-tab" data-soon="プレゼント" aria-label="プレゼント"></button>
      <button class="hud-tab" data-soon="マイページ" aria-label="マイページ"></button>
    </nav>
  </section>

  <div id="toast" class="toast"></div>

  <!-- メニュー詳細（開始確認） -->
  <section id="screen-detail" class="screen hud">
    <div class="hud-env"></div>
    <div class="hud-scroll detail-scroll">
      <header class="detail-top">
        <button id="btn-detail-back" class="hbtn-dark" aria-label="戻る">←</button>
        <h2 id="detail-title">メニュー</h2>
      </header>
      <div id="detail-hero" class="detail-hero glass"></div>
      <div class="hud-sec">種目リスト<i class="hud-slash"></i></div>
      <div id="detail-ex" class="detail-ex"></div>
      <p class="fan-note">本アプリはCryptoNinjaのファンメイド（二次創作）アプリです。</p>
    </div>
    <div class="detail-cta">
      <span class="detail-cta-q">このメニューを始めますか？</span>
      <button id="btn-detail-start" class="detail-start-btn">はい、はじめる <b>›</b></button>
    </div>
  </section>

  <!-- ワークアウト一覧 -->
  <section id="screen-catalog" class="screen hud">
    <div class="hud-env"></div>
    <header class="catalog-header">
      <button id="btn-catalog-back" class="hbtn-dark" aria-label="戻る">←</button>
      <h2>ワークアウト一覧</h2>
    </header>
    <div id="catalog-list"></div>
  </section>

  <!-- 実行 -->
  <section id="screen-run" class="screen hud phase-prepare">
      <div class="hud-env"></div>
      <header class="run-header">
        <button id="btn-quit" class="hbtn" aria-label="中断">←</button>
        <div class="run-titles">
          <div id="run-title"></div>
          <div id="run-progress"></div>
        </div>
        <button id="btn-sound" class="hbtn" aria-label="サウンド">🔊</button>
      </header>

      <div id="run-phase"></div>
      <div class="chara-stage chara-stage-run"><div id="run-chara" class="chara-box"></div></div>
      <p id="run-quote"></p>

      <div class="gauge-wrap">
        <svg viewBox="0 0 100 100">
          <defs>
            <linearGradient id="gauge-grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#fff"></stop>
              <stop offset="100%" stop-color="#ffd9e6"></stop>
            </linearGradient>
          </defs>
          <circle id="gauge-bg" cx="50" cy="50" r="45"></circle>
          <circle id="gauge-arc" cx="50" cy="50" r="45"
                  stroke-dasharray="282.74" stroke-dashoffset="0"></circle>
        </svg>
        <div id="run-count"></div>
      </div>

      <button id="btn-pause" aria-label="一時停止">⏸</button>
      <p id="run-next"></p>
  </section>

  <!-- 完了 -->
  <section id="screen-done" class="screen hud">
    <div class="hud-env"></div>
    <div id="confetti-layer" class="confetti-layer"></div>
    <div class="chara-stage chara-stage-done"><div id="done-chara" class="chara-box"></div></div>
    <p id="done-quote" class="quote-bubble" style="color: var(--ink)"></p>
    <ul id="done-stats"></ul>
    <div>
      <a id="btn-share" class="btn-primary" target="_blank" rel="noopener">Xでシェア</a>
    </div>
    <div>
      <button id="btn-done-home" class="btn-ghost">ホームへ戻る</button>
    </div>
  </section>

  <script src="js/data.js?v=40"></script>
  <script src="js/audio.js?v=40"></script>
  <script src="js/timer.js?v=40"></script>
  <script src="js/app.js?v=40"></script>
</body>
</html>

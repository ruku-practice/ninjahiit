name: Deploy redirect page to Pages

# 旧URL(ruku-practice.github.io/ninjahiit/)を rukupractice.com/kintore/ へ転送する
# 静的ページだけを配信する。レガシーJekyllビルドが不調のためActions方式で公開する。

on:
  push:
    branches: [main]
    paths:
      - "redirect/**"
      - ".github/workflows/pages-redirect.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble static site (redirect only)
        run: |
          rm -rf _site
          mkdir -p _site
          cp redirect/index.html _site/index.html
          touch _site/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
